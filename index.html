<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <title>BAD SCIENCE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow-x: hidden;
    }

    .image-container {
      width: 100%;
      height: 80vh;
      margin-top: 10vh;
      overflow: hidden;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .fixed-text {
      position: fixed;
      top: 50%;
      left: 2.5em;
      transform: translateY(-50%);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      font-size: 2.2em;
      color: black;
      white-space: nowrap;
      pointer-events: none;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="image-container">
    <img src="img/badscience.jpg" alt="Bad Science">
  </div>
  <div class="fixed-text">BAD SCIENCE</div>
</body>
</html>
